<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Final Template - Single Post 1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body { margin: 0; padding: 0; width: var(--width); height: var(--height); display: flex; background-color: var(--brand-black); font-family: 'Outfit', sans-serif; overflow: hidden; position: relative; }
        .background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background-image: url('https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?q=80&w=1080&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, rgba(0,158,237,1) 0%, rgba(0,158,237,0.75) 40%, rgba(0,158,237,0) 100%); z-index: 2; }
        .top-left-logo { position: absolute; top: 60px; left: 60px; z-index: 3; display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 85px; height: auto; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3)); }
        .logo-text { color: white; font-size: 34px; font-weight: 600; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .bottom-content { position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 3; display: flex; flex-direction: column; }
        .headline { color: var(--brand-white); font-size: 75px; font-weight: 700; line-height: 1.15; margin: 0 0 25px 0; text-shadow: 0 5px 15px rgba(0,0,0,0.7); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .summary { color: rgba(255, 255, 255, 0.95); font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 400; line-height: 1.5; margin: 0 0 40px 0; text-shadow: 0 3px 10px rgba(0,0,0,0.7); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tag-row { display: flex; align-items: center; justify-content: space-between; }
        .tag { background-color: var(--brand-black); color: var(--brand-white); padding: 12px 25px; font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .footer-handle { color: var(--brand-white); font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700; }
    </style>
<style>.logo-img { filter: brightness(0) invert(1) drop-shadow(0 2px 10px rgba(0,0,0,0.5)) !important; }</style></head>
<body>
<div class="background" id="bg-layer" style="background-image: url('file:///C:/Users/sushi/Desktop/AutoNewsBot/background.jpg') !important;"></div>
<div class="overlay"></div>
<div class="top-left-logo">
<img alt="Logo" class="logo-img" src="logo.svg"/>
</div>
<div class="bottom-content">
<h1 class="headline" id="title-text">Instacart acquires Israeli AI startup Arpalus to bring real-time shelf intelligence to supermarkets</h1>
<p class="summary" id="summary-text">Comprehensive, up-to-date news coverage, aggregated from sources all over the world by Google News.</p>
<div class="tag-row">
<div class="tag" id="tag-text">TECH NEWS</div>
<div class="footer-handle">@infizyinsights</div>
</div>
</div>
</body>
</html>
