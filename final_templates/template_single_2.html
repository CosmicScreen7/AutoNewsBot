<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Template - Single Post 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body { margin: 0; padding: 0; width: var(--width); height: var(--height); display: flex; background-color: var(--brand-black); font-family: 'Outfit', sans-serif; overflow: hidden; position: relative; }
        .background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1080&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,0.4) 50%, rgba(8,8,8,0) 100%); z-index: 2; }
        
        .top-left-logo { position: absolute; top: 60px; left: 60px; z-index: 3; display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 75px; height: auto; }
        .logo-text { color: white; font-size: 34px; font-weight: 600; letter-spacing: 1px; }
        
        .bottom-content { position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 3; display: flex; flex-direction: column; }
        
        .tag-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .tag { background-color: var(--brand-blue); color: var(--brand-white); padding: 10px 20px; font-size: 22px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .date-text { color: rgba(255,255,255,0.7); font-size: 18px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        
        .headline { color: var(--brand-white); font-size: 65px; font-weight: 800; line-height: 1.15; margin: 0 0 35px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .summary-box { background: rgba(8, 8, 8, 0.85); border: 2px solid rgba(255,255,255,0.15); border-left: 8px solid var(--brand-blue); padding: 35px 40px; border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .summary { color: rgba(255, 255, 255, 0.95); font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 400; line-height: 1.5; margin: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div class="background" id="bg-layer"></div>
    <div class="overlay"></div>
    
    <div class="top-left-logo">
        <img src="logo.svg" class="logo-img" alt="Logo">
    </div>
    
    <div class="bottom-content">
        <div class="tag-row">
            <div class="tag" id="tag-text">TECH NEWS</div>
            <div class="date-text">LATEST UPDATE</div>
        </div>
        <h1 class="headline" id="title-text">Google's New AI Breaks Records: The Future of Automation is Here Today</h1>
        
        <div class="summary-box">
            <p class="summary" id="summary-text">Experts predict massive shifts in the tech industry as generative AI models become faster and more reliable than ever before, paving the way for unprecedented innovation.</p>
        </div>
    </div>
</body>
</html>
