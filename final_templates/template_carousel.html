<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Template - Carousel Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body { margin: 0; padding: 0; width: var(--width); height: var(--height); display: flex; background-color: var(--brand-white); font-family: 'Outfit', sans-serif; overflow: hidden; position: relative; }
        .background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background-image: url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1080&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0.95) 45%, rgba(255,255,255,0) 100%); z-index: 2; }
        .top-left-logo { position: absolute; top: 60px; left: 60px; z-index: 3; display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 85px; height: auto; }
        .logo-text { color: var(--brand-black); font-size: 34px; font-weight: 600; letter-spacing: 1px; }
        .bottom-content { position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 3; display: flex; justify-content: space-between; align-items: flex-end; }
        .text-group { width: 75%; display: flex; flex-direction: column; align-items: flex-start; }
        .tag { background-color: var(--brand-blue); color: var(--brand-white); padding: 12px 25px; font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: inline-block; white-space: nowrap; }
        .headline { color: var(--brand-black); font-size: 75px; font-weight: 800; line-height: 1.15; margin: 0; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .paragraph { color: var(--brand-black); font-size: 45px; font-weight: 600; line-height: 1.4; margin: 0; display: none; -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
        
        body.slide-type-1 #title-text { display: -webkit-box; }
        body.slide-type-1 #summary-text { display: none; }
        
        body.slide-type-n #title-text { display: none; }
        body.slide-type-n #summary-text { display: -webkit-box; }
        .swipe-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 5px; }
        .swipe-button { width: 120px; height: 120px; background-color: var(--brand-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 50px; box-shadow: 0 15px 30px rgba(0, 158, 237, 0.4); }
        .swipe-text { color: var(--brand-black); font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .sequence-text { color: #555; font-size: 20px; font-weight: 700; }
        body.last-slide .swipe-button { display: none; }
        body.last-slide .swipe-text { display: none; }
    </style>
</head>
<body>
    <div class="background" id="bg-layer"></div>
    <div class="overlay"></div>
    <div class="top-left-logo">
        <img src="logo.svg" class="logo-img" alt="Logo">
    </div>
    <div class="bottom-content">
        <div class="text-group">
            <div class="tag" id="tag-text">MARKETING</div>
            <h1 class="headline" id="title-text">How Top Brands Use ChatGPT for Sales & Automation</h1>
            <p class="paragraph" id="summary-text">This is the summary paragraph for slides 2-5. It is smaller and easier to read.</p>
        </div>
        <div class="swipe-container" id="swipe-container">
            <div class="swipe-button">→</div>
            <div class="swipe-text">Swipe Left</div>
            <div class="sequence-text" id="sequence-text">1/3</div>
        </div>
    </div>
</body>
</html>
