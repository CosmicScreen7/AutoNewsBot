<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Post Layout 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body {
            margin: 0;
            padding: 0;
            width: var(--width);
            height: var(--height);
            background-color: var(--brand-black);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Top section: Image (65%) */
        .image-container {
            width: 100%;
            height: 60%;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1080&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }
        
        /* The signature blue separator line */
        .separator {
            width: 100%;
            height: 15px;
            background-color: var(--brand-blue);
            box-shadow: 0 0 20px rgba(0, 158, 237, 0.5);
            z-index: 10;
        }
        
        /* Bottom section: Content (40%) */
        .content-container {
            width: 100%;
            height: 40%;
            padding: 60px 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }
        
        /* Category Tag */
        .tag-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .tag-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        
        .tag {
            background-color: var(--brand-blue);
            color: var(--brand-white);
            padding: 10px 25px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
        }
        
        .date {
            color: #888;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
        }
        
        /* Main Headline */
        .headline {
            color: var(--brand-white);
            font-size: 65px;
            font-weight: 900;
            line-height: 1.2;
            margin: 0 0 25px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Subtext / Hook */
        .subtext {
            color: #cccccc;
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            line-height: 1.5;
            border-left: 4px solid var(--brand-blue);
            padding-left: 20px;
        }
        
        /* Header Logo Overlay */
        .logo-bar {
            position: absolute;
            top: 50px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid rgba(0, 158, 237, 0.3);
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background-color: var(--brand-blue);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
        }
        
        .logo-text {
            color: var(--brand-white);
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>
    
    <div class="image-container" id="bg-layer">
        <div class="logo-bar">
            <div class="logo-icon">🌐</div>
            <div class="logo-text">INFIZY</div>
        </div>
    </div>
    
    <div class="separator"></div>
    
    <div class="content-container">
        <div class="tag-wrapper">
            <div class="tag-left">
                <div class="tag" id="tag-text">AI NEWS</div>
                <div class="date" id="date-text">LATEST UPDATE</div>
            </div>
        </div>
        
        <h1 class="headline" id="title-text">
            Google Announces New AI Agent Capable of Building Entire Apps in Minutes
        </h1>
        
        <div class="subtext" id="summary-text">
            The new breakthrough could change the software development industry forever, making coding accessible to everyone.
        </div>
    </div>

</body>
</html>
