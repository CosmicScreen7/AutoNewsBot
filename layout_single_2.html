<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Post Layout 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px; /* Instagram Portrait size */
        }
        body {
            margin: 0;
            padding: 0;
            width: var(--width);
            height: var(--height);
            display: flex;
            background-color: var(--brand-black);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Placeholder for dynamic injection */
            background-image: url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1080&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }
        
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,0.85) 45%, rgba(8,8,8,0) 100%);
            z-index: 2;
        }
        
        .content {
            position: absolute;
            bottom: 80px;
            left: 80px;
            right: 80px;
            z-index: 3;
            color: var(--brand-white);
        }
        
        .tag-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .tag {
            display: inline-block;
            background: var(--brand-blue);
            color: white;
            padding: 10px 25px;
            border-radius: 4px;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0, 158, 237, 0.4);
        }
        
        .date {
            color: #ccc;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
        }
        
        .headline {
            font-size: 75px;
            font-weight: 900;
            line-height: 1.15;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .header {
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 3;
        }
        
        .logo-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(8, 8, 8, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid rgba(0, 158, 237, 0.3);
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--brand-blue);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
        }
        
        .logo-text {
            color: var(--brand-white);
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        
        .swipe-hint {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(8, 8, 8, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(0, 158, 237, 0.3);
        }
        
        /* Glassmorphism subtle touches */
        .glass-panel {
            margin-top: 35px;
            padding: 25px 30px;
            background: rgba(8, 8, 8, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0 15px 15px 0;
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            color: #e0e0e0;
            line-height: 1.4;
            border: 1px solid rgba(0, 158, 237, 0.2);
            border-left: 6px solid var(--brand-blue);
        }
    </style>
</head>
<body>
    <!-- Background Layer -->
    <div class="background" id="bg-layer"></div>
    <div class="overlay"></div>
    
    <!-- Top Bar -->
    <div class="header">
        <div class="logo-bar">
            <div class="logo-icon">🌐</div>
            <div class="logo-text">INFIZY</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="content">
        <div class="tag-wrapper">
            <div class="tag" id="tag-text">TECH NEWS</div>
            <div class="date" id="date-text">LATEST UPDATE</div>
        </div>
        
        <h1 class="headline" id="title-text">
            Google's New AI Breaks Records: The Future of Automation is Here Today
        </h1>
        
        <div class="glass-panel" id="summary-text">
            Experts predict massive shifts in the tech industry as generative AI models become faster and more reliable than ever before.
        </div>
    </div>
</body>
</html>
