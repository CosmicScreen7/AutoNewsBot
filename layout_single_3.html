<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Post Layout 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body {
            margin: 0;
            padding: 0;
            width: var(--width);
            height: var(--height);
            background-color: var(--brand-black);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Subtle blue gradient in the background corners */
            background: radial-gradient(circle at top right, rgba(0,158,237,0.15) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0,158,237,0.1) 0%, var(--brand-black) 50%);
        }
        
        /* The main floating card */
        .card {
            width: 940px;
            height: 1220px;
            background-color: var(--brand-white);
            border-radius: 0px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 158, 237, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* Top Branding */
        .card-header {
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--brand-white);
        }
        
        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background-color: var(--brand-blue);
            color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
        }
        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 34px;
            font-weight: 900;
            color: var(--brand-black);
            letter-spacing: -0.5px;
        }
        
        .date-badge {
            font-size: 20px;
            font-weight: 700;
            color: #777;
            background: #f0f4f8;
            padding: 10px 22px;
            border-radius: 0px;
            letter-spacing: 1px;
        }
        
        /* Image Section */
        .image-wrapper {
            width: 100%;
            height: 520px;
            position: relative;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tag-pill {
            position: absolute;
            bottom: -28px;
            left: 50px;
            background-color: var(--brand-blue);
            color: var(--brand-white);
            padding: 14px 35px;
            border-radius: 0px;
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 158, 237, 0.4);
            border: 5px solid var(--brand-white);
        }
        
        /* Content Section */
        .card-content {
            padding: 75px 50px 40px 50px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--brand-white);
        }
        
        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 60px;
            font-weight: 900;
            line-height: 1.15;
            color: var(--brand-black);
            margin: 0 0 25px 0;
            letter-spacing: -1px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .summary {
            font-size: 30px;
            line-height: 1.6;
            color: #444;
            margin: 0;
            font-weight: 400;
        }
        
        /* Footer Handle */
        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 35px;
            border-top: 2px solid #f0f0f0;
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--brand-black);
        }
        
        .footer-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .footer-item span {
            color: var(--brand-blue);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Header -->
        <div class="card-header">
            <div class="logo-group">
                <div class="logo-icon">🌐</div>
                <div class="logo-text">INFIZY</div>
            </div>
            <div class="date-badge" id="date-text">LATEST NEWS</div>
        </div>
        
        <!-- Image -->
        <div class="image-wrapper">
            <img id="bg-layer" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1080&auto=format&fit=crop" alt="News Image">
            <div class="tag-pill" id="tag-text">BUSINESS</div>
        </div>
        
        <!-- Content -->
        <div class="card-content">
            <h1 class="headline" id="title-text">Global Markets Surge as New AI Technologies Drive Unprecedented Growth</h1>
            <p class="summary" id="summary-text">Analysts project a massive 40% increase in digital marketing budgets as companies scramble to adopt the latest automation tools across all platforms.</p>
            
            <div class="card-footer">
                <div class="footer-item"><span>@</span>infizyinsights</div>
                <div class="footer-item"><span>🌐</span>infizy.com</div>
            </div>
        </div>
    </div>
</body>
</html>
