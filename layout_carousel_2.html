<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Layout - Slide 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #009eed;
            --brand-black: #080808;
            --brand-white: #ffffff;
            --width: 1080px;
            --height: 1350px;
        }
        body {
            margin: 0;
            padding: 0;
            width: var(--width);
            height: var(--height);
            display: flex;
            flex-direction: column;
            background-color: var(--brand-black);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        
        .top-image {
            width: 100%;
            height: 55%;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1556761175-5973dc0f32d7?q=80&w=1080&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }
        
        .logo-bar {
            position: absolute;
            top: 50px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo-icon {
            font-size: 28px;
            color: var(--brand-blue);
        }
        
        .logo-text {
            color: white;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        
        .bottom-card {
            width: 100%;
            height: 45%;
            background-color: var(--brand-blue);
            padding: 70px 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .tag-line {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .tag {
            background-color: var(--brand-black);
            color: var(--brand-white);
            padding: 12px 25px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .headline {
            color: var(--brand-white);
            font-size: 65px;
            font-weight: 900;
            line-height: 1.15;
            margin: 0;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            width: 80%;
        }
        
        .swipe-button {
            position: absolute;
            bottom: 60px;
            right: 60px;
            width: 110px;
            height: 110px;
            background-color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 45px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border: 4px solid var(--brand-white);
            border-radius: 50%;
        }
        
        /* Decorative Pattern */
        .pattern {
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 300px;
            color: rgba(255,255,255,0.07);
            font-weight: 900;
            line-height: 1;
            user-select: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="top-image" id="bg-layer">
        <div class="logo-bar">
            <div class="logo-icon">🌐</div>
            <div class="logo-text">INFIZY</div>
        </div>
    </div>
    
    <div class="bottom-card">
        <div class="pattern">⚡</div>
        <div style="z-index: 2;">
            <div class="tag-line">
                <div class="tag" id="tag-text">BUSINESS</div>
            </div>
            <h1 class="headline" id="title-text">Startups Raise Record Funding in Q2 2025 Due to AI Boom</h1>
        </div>
        
        <div class="swipe-button">
            →
        </div>
    </div>
</body>
</html>
